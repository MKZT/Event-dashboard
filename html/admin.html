<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін панель - Події у місті</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        form { margin-top: 20px; }
        input, textarea { display: block; margin-bottom: 10px; width: 100%; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>Адмін панель для подій у місті</h1>
    
    <h2>Список подій</h2>
    <table id="eventsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Назва</th>
                <th>Дата</th>
                <th>Місце</th>
                <th>Опис</th>
                <th>Дії</th>
            </tr>
        </thead>
        <tbody>
            <!-- Тут будуть додані події динамічно -->
        </tbody>
    </table>
    
    <h2>Додати нову подію</h2>
    <form id="addEventForm">
        <input type="text" id="eventName" placeholder="Назва події" required>
        <input type="date" id="eventDate" required>
        <input type="text" id="eventLocation" placeholder="Місце проведення" required>
        <textarea id="eventDescription" placeholder="Опис події" rows="4" required></textarea>
        <button type="submit">Додати подію</button>
    </form>
    
    <script>
        // Простий JavaScript для демонстрації (без сервера)
        let events = [];
        let eventId = 1;
        
        const tableBody = document.querySelector('#eventsTable tbody');
        const form = document.getElementById('addEventForm');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('eventName').value;
            const date = document.getElementById('eventDate').value;
            const location = document.getElementById('eventLocation').value;
            const description = document.getElementById('eventDescription').value;
            
            const event = { id: eventId++, name, date, location, description };
            events.push(event);
            addEventToTable(event);
            
            form.reset();
        });
        
        function addEventToTable(event) {
            const row = tableBody.insertRow();
            row.insertCell(0).textContent = event.id;
            row.insertCell(1).textContent = event.name;
            row.insertCell(2).textContent = event.date;
            row.insertCell(3).textContent = event.location;
            row.insertCell(4).textContent = event.description;
            const actionsCell = row.insertCell(5);
            actionsCell.innerHTML = '<button onclick="deleteEvent(' + event.id + ')">Видалити</button>';
        }
        
        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            tableBody.innerHTML = '';
            events.forEach(addEventToTable);
        }
    </script>
</body>
</html>
